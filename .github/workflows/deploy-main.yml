name: Deploy VelocityIQ · Production (main)

# Publishes the main branch to the ROOT of the gh-pages branch.
# Live link:  https://vasanthvaidya.github.io/velocityiq/
# Any push to main auto-redeploys within ~1 minute.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize all gh-pages publishes (main + dev) so they never race each other.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble production site
        run: |
          mkdir -p _site
          cp velocityiq.html _site/index.html
          cp velocityiq.html _site/velocityiq.html
          touch _site/.nojekyll

      - name: Publish to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          # Never delete the staging build when production redeploys.
          clean-exclude: |
            dev
            dev/**

