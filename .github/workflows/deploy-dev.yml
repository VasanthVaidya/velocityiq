name: Deploy VelocityIQ · Staging (dev)

# Publishes the dev branch to the /dev/ subfolder of the gh-pages branch.
# Separate live link:  https://vasanthvaidya.github.io/velocityiq/dev/
# Any push to dev auto-redeploys within ~1 minute — independent of main.
on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

# Same group as production so the two never push gh-pages simultaneously.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble staging site
        run: |
          mkdir -p _site
          cp velocityiq.html _site/index.html
          # Add a visible STAGING badge so the dev link is obvious at a glance.
          sed -i "s@</body>@<div style=\"position:fixed;left:12px;bottom:12px;z-index:99999;font:700 11px system-ui,sans-serif;letter-spacing:.5px;padding:6px 12px;border-radius:999px;background:#FFB347;color:#04121a;box-shadow:0 8px 22px rgba(0,0,0,.45)\">STAGING &middot; dev branch</div></body>@" _site/index.html
          cp _site/index.html _site/velocityiq.html
          touch _site/.nojekyll

      - name: Publish to gh-pages (/dev subfolder)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _site
          target-folder: dev
          clean: true

