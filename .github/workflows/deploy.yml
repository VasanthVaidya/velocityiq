name: Deploy VelocityIQ demo to GitHub Pages

# Runs on every push to main/master — so any frontend update you push
# is automatically published to the live link within ~1 minute.
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site
        run: |
          mkdir -p _site
          # Serve the demo at the site root (index.html) and by its own name
          cp velocityiq.html _site/index.html
          cp velocityiq.html _site/velocityiq.html
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

